    spoken: "pie-dantic"
    alts: ["pedantic", "py dantic", "pie dantic", "pedantik"]
  - canonical: "llama.cpp"
    category: tool              # local inference runtime
    spoken: "llama C P P"
    alts: ["llama cpp", "lama cpp", "llama c p p", "llama see plus plus", "lama, cpp"]
