# data/terms_hard.yaml
# Research-backed "genuinely hard" terms (March–June 2026 trending pass).
# Same schema as terms.yaml:
#   canonical : exact spelling used in every transcript and in scoring
#   category  : model | lab | product | tool | format | method | concept
#   spoken    : (optional) pronunciation override fed to TTS; transcript stays canonical.
#               Values here are PROVISIONAL — finalized during the Kokoro pronunciation audit.
#   alts      : spoken / mis-heard forms stock base.en emits; used only by term-recall.
# Extra fields for context-dependent homophones (Group B):
#   anchors   : words that must co-occur in a sentence for the tech sense to be valid
#   everyday  : the ordinary-English word the model must NOT trigger out of context
#               (corpus must include negative sentences using the everyday sense)

