# data/terms_hard.yaml
# Research-backed "genuinely hard" terms (March–June 2026 trending pass).
# Same schema as terms.yaml:
#   canonical : exact spelling used in every transcript and in scoring
#   category  : model | lab | product | tool | format | method | concept
#   spoken    : (optional) pronunciation override fed to TTS; transcript stays canonical.
#               Values here are PROVISIONAL — finalized during the Kokoro pronunciation audit.
#   alts      : spoken / mis-heard forms stock base.en emits; used only by term-recall.
# Extra fields for context-dependent homophones (Group B):
#   anchors   : words that must co-occur in a sentence for the tech sense to be valid
#   everyday  : the ordinary-English word the model must NOT trigger out of context
#               (corpus must include negative sentences using the everyday sense)

terms:
  # ============================================================
  # Group A — OOV / spelling-hard (fail regardless of context)
  # ============================================================
  - canonical: "Qwen"
    category: model
    spoken: "chwen"            # provisional; espeak says "kwen" letters otherwise
    alts: ["qn3", "queen", "quinn", "when", "gwen", "q when"]
  - canonical: "DeepSeek"
    category: model
    alts: ["deep seek", "deep seq", "deep-seek are one", "deepseq"]
  - canonical: "Kimi"
    category: model
    spoken: "kee-mee"
    alts: ["kimmy", "kimi k2", "kimike 2", "kim e"]
  - canonical: "Groq"
    category: lab               # inference-chip company (LPU)
    spoken: "grock"
    alts: ["groc", "grock", "rock", "grok"]
  - canonical: "Cline"
    category: product           # coding agent
    spoken: "kline"
    alts: ["climb", "client", "klein", "cline ai", "kline"]
  - canonical: "Aider"
    category: product           # coding agent — BORDERLINE (fading in mindshare; keep for ASR-hardness)
    spoken: "ay-der"
    alts: ["aider", "raider", "aid her", "ada", "aiter"]
  - canonical: "Zed"
    category: product           # Rust code editor (1.0, Apr 2026)
