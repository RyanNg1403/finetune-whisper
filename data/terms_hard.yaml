    anchors: ["bolt.new", "StackBlitz", "app builder", "prompt", "deploy"]
    everyday: "bolt (fastener / lightning)"
    alts: ["bolt", "bold", "boltt"]
  - canonical: "Modal"
    category: tool              # serverless GPU platform — KEEP (hot: $4.65B, May 2026; best homophone vs "model")
    spoken: "moh-dal"
    anchors: ["serverless", "GPU", "deploy", "container", "Python"]
