  # ============================================================
  # Group B — homophone / context-dependent (MUST be anchored)
  # Transcribe the tech spelling ONLY when anchors co-occur;
  # otherwise the everyday word. Corpus needs positive AND
  # negative sentences for each.
  # ============================================================
  - canonical: "RoPE"
    category: method            # rotary positional encoding
    spoken: "rope"
    anchors: ["positional encoding", "context window", "attention", "extrapolation", "long context"]
